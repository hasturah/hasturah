<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>writings — hasturah</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:ital,wght@0,300;0,400;1,300&display=swap" rel="stylesheet">

  <style>
    :root {
      --black: #080800;
      --ink:   #0f0e00;
      --gold:  #e8a000;
      --amber: #f5c842;
      --dim:   #6b5000;
      --muted: #9a7a20;
      --water: #111000;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { scroll-behavior: smooth; }

    body {
      background: var(--black);
      color: var(--muted);
      font-family: 'IBM Plex Mono', monospace;
      font-weight: 300;
      font-size: 14px;
      line-height: 1.9;
      min-height: 100vh;
    }

    body::after {
      content: '';
      position: fixed;
      inset: 0;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 512 512' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.75' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.035'/%3E%3C/svg%3E");
      pointer-events: none;
      z-index: 999;
    }

    /* ---- NAV ---- */
    nav {
      position: fixed;
      top: 0; left: 0; right: 0;
      z-index: 50;
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 1.4rem 2.5rem;
      background: rgba(8,8,0,0.97);
      border-bottom: 1px solid rgba(107,80,0,0.18);
    }

    .nav-brand {
      font-size: 0.62rem;
      letter-spacing: 0.28em;
      text-transform: uppercase;
      color: var(--amber);
      text-decoration: none;
      transition: color 0.3s;
    }
    .nav-brand:hover { color: var(--gold); }

    .nav-back {
      font-size: 0.56rem;
      letter-spacing: 0.22em;
      text-transform: uppercase;
      color: var(--dim);
      text-decoration: none;
      transition: color 0.3s;
    }
    .nav-back:hover { color: var(--gold); }

    /* ---- HERO ---- */
    .page-header {
      padding: 10rem 2rem 4rem;
      max-width: 680px;
      margin: 0 auto;
    }

    .page-label {
      font-size: 0.54rem;
      letter-spacing: 0.4em;
      text-transform: uppercase;
      color: var(--dim);
      margin-bottom: 1.4rem;
      display: flex;
      align-items: center;
      gap: 1.2rem;
    }

    .page-label::after {
      content: '';
      flex: 1;
      height: 1px;
      background: linear-gradient(to right, var(--dim), transparent);
    }

    .page-title {
      font-size: clamp(1.2rem, 3vw, 2rem);
      font-weight: 300;
      color: var(--amber);
      letter-spacing: 0.2em;
      text-transform: uppercase;
      margin-bottom: 0.8rem;
    }

    .page-sub {
      font-size: 0.72rem;
      color: var(--dim);
      letter-spacing: 0.12em;
    }

    /* ---- FILTER BAR ---- */
    .filter-bar {
      max-width: 680px;
      margin: 0 auto 1rem;
      padding: 0 2rem;
      display: flex;
      gap: 0.6rem;
      flex-wrap: wrap;
    }

    .filter-btn {
      background: transparent;
      border: 1px solid rgba(107,80,0,0.3);
      color: var(--dim);
      font-family: 'IBM Plex Mono', monospace;
      font-weight: 300;
      font-size: 0.48rem;
      letter-spacing: 0.22em;
      text-transform: uppercase;
      padding: 0.3rem 0.8rem;
      cursor: pointer;
      transition: border-color 0.3s, color 0.3s;
    }

    .filter-btn:hover,
    .filter-btn.active { border-color: var(--gold); color: var(--gold); }

    /* ---- WRITINGS LIST ---- */
    .writings-body {
      max-width: 680px;
      margin: 0 auto;
      padding: 0 2rem 6rem;
    }

    .writing-list { list-style: none; }

    .writing-list li {
      display: flex;
      justify-content: space-between;
      align-items: baseline;
      gap: 1rem;
      padding: 1.2rem 0;
      border-top: 1px solid rgba(107,80,0,0.2);
      transition: padding-left 0.3s;
      cursor: pointer;
    }

    .writing-list li:last-child { border-bottom: 1px solid rgba(107,80,0,0.2); }
    .writing-list li:hover { padding-left: 0.5rem; }
    .writing-list li.no-link { cursor: default; }
    .writing-list li.no-link:hover { padding-left: 0; }

    .wt { font-size: 0.82rem; color: var(--gold); transition: color 0.3s; }
    .writing-list li:hover .wt { color: var(--amber); }
    .writing-list li.no-link .wt { color: var(--dim); }

    .wmeta {
      display: flex;
      align-items: center;
      gap: 0.8rem;
      flex-shrink: 0;
    }

    .wm { font-size: 0.58rem; color: var(--dim); letter-spacing: 0.15em; white-space: nowrap; }

    .wtype {
      font-size: 0.46rem;
      letter-spacing: 0.15em;
      color: var(--dim);
      border: 1px solid rgba(107,80,0,0.3);
      padding: 0.1rem 0.35rem;
      text-transform: uppercase;
      transition: color 0.3s, border-color 0.3s;
    }

    .writing-list li:hover .wtype { color: var(--amber); border-color: var(--amber); }

    .writing-list a {
      display: flex;
      justify-content: space-between;
      align-items: baseline;
      gap: 1rem;
      width: 100%;
      color: inherit;
      text-decoration: none;
    }

    .empty-msg {
      padding: 4rem 0;
      font-size: 0.65rem;
      letter-spacing: 0.25em;
      color: var(--dim);
      opacity: 0.5;
      text-align: center;
    }

    /* ---- PDF OVERLAY ---- */
    #pdf-overlay {
      position: fixed;
      inset: 0;
      z-index: 600;
      display: flex;
      flex-direction: column;
      background: rgba(8,8,0,0.97);
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.35s ease;
    }

    #pdf-overlay.open { opacity: 1; pointer-events: all; }

    #pdf-overlay-bar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 1rem 2rem;
      border-bottom: 1px solid rgba(107,80,0,0.3);
      flex-shrink: 0;
      gap: 1rem;
    }

    #pdf-overlay-title {
      font-size: 0.62rem;
      letter-spacing: 0.28em;
      text-transform: uppercase;
      color: var(--muted);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    #pdf-overlay-actions { display: flex; gap: 0.7rem; flex-shrink: 0; }

    .pdf-btn {
      background: transparent;
      border: 1px solid rgba(107,80,0,0.4);
      color: var(--dim);
      font-family: 'IBM Plex Mono', monospace;
      font-weight: 300;
      font-size: 0.5rem;
      letter-spacing: 0.25em;
      text-transform: uppercase;
      padding: 0.35rem 0.9rem;
      cursor: pointer;
      text-decoration: none;
      display: inline-block;
      transition: color 0.3s, border-color 0.3s;
    }
    .pdf-btn:hover { color: var(--gold); border-color: var(--gold); }

    #pdf-frame {
      flex: 1;
      border: none;
      background: var(--black);
      width: 100%;
    }

    /* ---- DAY MODE ---- */
    html.day {
      --black:  #f5f0d5;
      --ink:    #e6dbb0;
      --gold:   #8a5500;
      --amber:  #3d2000;
      --dim:    #9a7a20;
      --muted:  #5a3c00;
      --water:  #e0d8a0;
    }

    html.day nav { background: rgba(245,240,213,0.97); }

    @media (max-width: 580px) {
      nav { padding: 0.9rem 1.2rem; }
      .page-header { padding: 7rem 1.4rem 3rem; }
      .filter-bar { padding: 0 1.4rem; }
      .writings-body { padding: 0 1.4rem 4rem; }
      .writing-list li { flex-wrap: wrap; gap: 0.3rem; }
      .wm { white-space: normal; }
      #pdf-overlay-bar { flex-wrap: wrap; gap: 0.5rem; padding: 0.8rem 1rem; }
    }
  </style>
</head>
<body>

<!-- PDF overlay -->
<div id="pdf-overlay">
  <div id="pdf-overlay-bar">
    <span id="pdf-overlay-title"></span>
    <div id="pdf-overlay-actions">
      <a id="pdf-download-link" class="pdf-btn" download>download</a>
      <button class="pdf-btn" onclick="closePdfOverlay()">✕ close</button>
    </div>
  </div>
  <iframe id="pdf-frame" title="PDF viewer"></iframe>
</div>

<nav>
  <a href="index.html" class="nav-back">← hasturah</a>
  <a href="index.html" class="nav-brand">hasturah</a>
</nav>

<div class="page-header">
  <div class="page-label">archive</div>
  <h1 class="page-title">Writings</h1>
  <p class="page-sub" id="writing-count">— loading —</p>
</div>

<div class="filter-bar" id="filter-bar"></div>

<div class="writings-body">
  <ul class="writing-list" id="writings-list"></ul>
  <div class="empty-msg" id="empty-msg" style="display:none">— no writings yet —</div>
</div>

<script>
  function escHtml(s) {
    return String(s || '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }

  // ---- Theme ----
  (function() {
    const h = new Date().getHours() + new Date().getMinutes() / 60;
    if (h >= 6 && h < 19) document.documentElement.classList.add('day');
  })();

  // ---- Load writings ----
  let allWritings = [];
  let activeFilter = 'all';

  async function loadWritings() {
    let writings = [];
    try {
      const res = await fetch('data.json');
      if (res.ok) {
        const d = await res.json();
        writings = Array.isArray(d.writings) ? d.writings : [];
      }
    } catch (_) {}

    if (!writings.length)
      writings = JSON.parse(localStorage.getItem('portfolio_writings') || '[]');

    allWritings = writings;
    buildFilters();
    render();
  }

  function buildFilters() {
    const types = ['all', ...new Set(allWritings.map(w => w.type).filter(Boolean))];
    const bar = document.getElementById('filter-bar');
    bar.innerHTML = types.map(t =>
      `<button class="filter-btn${t === 'all' ? ' active' : ''}" onclick="setFilter('${escHtml(t)}')">${escHtml(t)}</button>`
    ).join('');
  }

  function setFilter(type) {
    activeFilter = type;
    document.querySelectorAll('.filter-btn').forEach(b => {
      b.classList.toggle('active', b.textContent === type);
    });
    render();
  }

  function render() {
    const filtered = activeFilter === 'all'
      ? allWritings
      : allWritings.filter(w => w.type === activeFilter);

    const list  = document.getElementById('writings-list');
    const count = document.getElementById('writing-count');
    const empty = document.getElementById('empty-msg');

    count.textContent = filtered.length + ' piece' + (filtered.length === 1 ? '' : 's');

    if (!filtered.length) {
      list.innerHTML = '';
      empty.style.display = 'block';
      return;
    }

    empty.style.display = 'none';
    list.innerHTML = filtered.map((w, i) => {
      const meta = `<div class="wmeta">
        <span class="wm">${escHtml(w.year)}</span>
        <span class="wtype">${escHtml(w.type)}</span>
      </div>`;

      if (w.linkType === 'pdf') {
        return `<li class="pdf-row" data-title="${escHtml(w.title)}" data-link="${escHtml(w.link)}">
          <span class="wt">${escHtml(w.title)}</span>
          ${meta}
        </li>`;
      } else if (w.linkType === 'url') {
        return `<li>
          <a href="${escHtml(w.link)}" target="_blank">
            <span class="wt">${escHtml(w.title)}</span>
            ${meta}
          </a>
        </li>`;
      } else {
        return `<li class="no-link">
          <span class="wt">${escHtml(w.title)}</span>
          ${meta}
        </li>`;
      }
    }).join('');

    list.querySelectorAll('li.pdf-row').forEach(li => {
      li.addEventListener('click', () => openPdfOverlay('pdfs/' + li.dataset.link, li.dataset.title));
    });
  }

  // ---- PDF overlay ----
  function openPdfOverlay(path, title) {
    document.getElementById('pdf-overlay-title').textContent = title;
    document.getElementById('pdf-frame').src = path;
    document.getElementById('pdf-download-link').href = path;
    document.getElementById('pdf-overlay').classList.add('open');
    document.body.style.overflow = 'hidden';
  }

  function closePdfOverlay() {
    document.getElementById('pdf-overlay').classList.remove('open');
    document.body.style.overflow = '';
    setTimeout(() => { document.getElementById('pdf-frame').src = ''; }, 380);
  }

  document.addEventListener('keydown', e => {
    if (e.key === 'Escape') closePdfOverlay();
  });

  loadWritings();
</script>
</body>
</html>
